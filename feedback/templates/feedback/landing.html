{% extends 'feedback/base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center text-center mt-5 pt-3 align-items-center min-vh-75">
    <div class="col-md-9 col-lg-6 col-xl-5">
        <div class="glass-panel p-4 p-md-5 position-relative overflow-hidden landing-card skeleton" style="border-radius: 8px;"
            data-aos="zoom-in" data-aos-duration="1200">
            
            <!-- Technical scanning background effect -->
            <div class="tech-scan-line"></div>
            <div class="tech-grid-overlay"></div>

            <div class="position-relative z-1 py-2">
                <div class="d-inline-flex bg-dark bg-opacity-50 rounded p-3 mb-4 shadow skeleton"
                    style="border: 1px solid rgba(74, 222, 128, 0.4);" data-aos="flip-up" data-aos-delay="300">
                    <i class="bi bi-shield-check display-5 poster-title"></i>
                </div>

                <h1 class="display-5 fw-bolder mb-3 poster-title skeleton" style="letter-spacing: 1px;" data-aos="fade-up" data-aos-delay="500">
                    FACULTY <span>UNFILTERED</span>
                </h1>

                <div class="mb-4 mx-auto skeleton" style="max-width: 400px; min-height: 2.5rem;" data-aos="fade-up" data-aos-delay="700">
                    <p class="fs-5 fw-medium mb-0" style="color: rgba(240, 253, 244, 0.75); line-height: 1.4;">
                        <span id="typed-subtitle"></span>
                    </p>
                </div>

                <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-4" data-aos="fade-up"
                    data-aos-delay="900">
                    <a href="{% url 'home' %}"
                        class="btn btn-glass px-4 py-2 fs-6 d-flex justify-content-center align-items-center rounded-1 shadow-sm cursor-hover skeleton">
                        <i class="bi bi-book-half me-2"></i> Dashboard
                    </a>
                    <a href="{% url 'submit_feedback' %}"
                        class="btn btn-primary-custom px-4 py-2 fs-6 rounded-1 d-flex justify-content-center align-items-center shadow-lg cursor-hover skeleton">
                        <i class="bi bi-shield-check me-2"></i> Submit Data
                    </a>
                </div>
            </div>
        </div>

        <div class="mt-4 small fw-medium" style="color: rgba(240,253,244,0.6);" data-aos="fade-in"
            data-aos-delay="1200">
            <div class="d-flex justify-content-center align-items-center gap-2 mb-2">
                <span class="pulse-dot"></span>
                <span class="text-uppercase" style="letter-spacing: 2px; font-size: 0.7rem;">Network Secure • System Online</span>
            </div>
            <p class="mb-0">100% Encrypted • Strictly Anonymous • For The Students</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
<script>
    var typed = new Typed('#typed-subtitle', {
        strings: [
            '"The Voice of the campus."'
        ],
        typeSpeed: 45,
        backSpeed: 25,
        backDelay: 2500,
        loop: true,
        showCursor: true,
        cursorChar: '|'
    });
</script>
{% endblock %}
