databases:
  - name: feedback-db
    databaseName: feedback
    user: feedback_user

services:
  - type: web
    name: anonymous-feedback-system
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn feedback_system.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: feedback-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
